<body>

        const { useState, useEffect, useRef } = React;

        // --- ICON SYSTEM FIX ---
        const createLucideIcon = (iconName) => (props) => {
            const iconData = window.lucide?.icons?.[iconName];
            if (!iconData) return <span className="text-xs">?</span>;
            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={props.size || 24}
                    height={props.size || 24}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth={props.strokeWidth || 2}
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={props.className}
                    {...props}
                >
                    {iconData.map((iconNode, index) => {
                        const [tag, attrs] = iconNode;
                        return React.createElement(tag, { ...attrs, key: index });
                    })}
                </svg>
            );
        };

        // Initialize Icons
        const Menu = createLucideIcon('Menu');
        const X = createLucideIcon('X');

        const RefreshCw = createLucideIcon('RefreshCw');

                    ]}, 
                    { week: "Week 10", theme: "The Waitlist", posts: [ 
                        { platform: "Stories", type: "Hype", content: "Something big is coming... \nINTERACTIVE: Countdown sticker." }, 
                        { platform: "Landing Page", type: "Lead Gen", content: "New Service Launching Soon. Join the Priority List for early access and a bonus." }

                    { week: "Week 11", theme: "Launch Week", posts: [

                        { platform: "All Channels", type: "Launch", content: "WE ARE LIVE! \nCAPTION: The [Product] is finally here. Solves [Problem]. \nCTA: Buy Now." } 
                    ]},
                    { week: "Week 12", theme: "Evergreen", posts: [ 
                        { platform: "Ads", type: "Automation", content: "Take top performing post from Month 1 and turn into an ad. \nTARGET: Lookalike audience." }, 
                        { platform: "Email", type: "Nurture", content: "SUBJECT: Did you see this? \nBODY: Recap of launch week. \nPS: We are almost sold out." } 
                    ]}
                ] 
            }
        };

        const App = () => {
            const [theme, setTheme] = useState('local');
            const [activeMonth, setActiveMonth] = useState('month1');
            const [greeting, setGreeting] = useState('Welcome');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            
            // --- AI STATE ---
            const [apiKey, setApiKey] = useState('');
            const [showApiKeyModal, setShowApiKeyModal] = useState(false);
            
            // GBP State
            const [gbpInput, setGbpInput] = useState('');
            const [gbpResult, setGbpResult] = useState('');
            const [isOptimizingGBP, setIsOptimizingGBP] = useState(false);
            const [activeGbpTab, setActiveGbpTab] = useState('bio');
            const [reviewInput, setReviewInput] = useState('Great service, highly recommended!');
            const [reviewResponse, setReviewResponse] = useState('');

            // Scan State
            const [scanInput, setScanInput] = useState({ name: '', location: '' });
            const [scanResult, setScanResult] = useState(null);
            const [isScanning, setIsScanning] = useState(false);

            const t = THEMES[theme];

            useEffect(() => {
                const hour = new Date().getHours();
                if (hour < 12) setGreeting("Good Morning, Melbourne.");
                else if (hour < 18) setGreeting("Good Afternoon.");
                else setGreeting("Good Evening.");

                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollTo = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                    setIsMenuOpen(false);
                }
            };

            const callGemini = async (prompt) => {
                if (!apiKey) { setShowApiKeyModal(true); return null; }
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Error generating content.";
                } catch (error) {
                    alert("Gemini Connection Error"); return null;
                }
            };

            const optimizeGBP = async () => {
                if (!gbpInput) return;
                setIsOptimizingGBP(true);
                const prompt = `Act as an SEO Expert. Rewrite this business description for a Google Business Profile. Optimize for "Entity SEO" and local relevance. Keep it under 750 characters. Business Info: ${gbpInput}`;
                const result = await callGemini(prompt);
                if (result) setGbpResult(result);
                setIsOptimizingGBP(false);
            }

            const generateReviewResponse = async () => {
                if (!reviewInput) return;
                setIsOptimizingGBP(true);
                const prompt = `Write a professional, empathetic response to this Google Review for a local business. Include keywords for SEO naturally. Review: "${reviewInput}"`;
                const result = await callGemini(prompt);
                if (result) setReviewResponse(result);
                setIsOptimizingGBP(false);
            }

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
                alert("Copied to clipboard!");
            }

            const runAuditScan = async () => {
                if (!scanInput.name || !scanInput.location) return alert("Please enter name and location");
                setIsScanning(true);
                // Simulate scan for demo if no API key, or real call if key exists
                if (!apiKey) {
                    setTimeout(() => {
                         setScanResult(MOCK_SCAN_DATA);
                         setIsScanning(false);
                    }, 1500);
                    return;
                }
                const prompt = `Act as a digital marketing auditor. Analyze a hypothetical business named "${scanInput.name}" in "${scanInput.location}". Return JSON array of 4 objects with keys: category, score (0-100), status (Critical/Warning/Good/Excellent), insight.`;
                const resultText = await callGemini(prompt);
                if (resultText) {
                    try {
                         const jsonStr = resultText.replace(/```json/g, '').replace(/```/g, '');
                         setScanResult(JSON.parse(jsonStr));
                    } catch(e) { setScanResult(MOCK_SCAN_DATA); }
                }
                setIsScanning(false);
            };

            return (
                <div className={`min-h-screen transition-colors duration-700 ${t.bg} ${t.text} ${t.font} overflow-x-hidden relative`}>
                    
                    {/* PARALLAX BG */}
                    <div className="fixed inset-0 z-0 pointer-events-none overflow-hidden">
                        <div className={`absolute top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full blur-[120px] opacity-30 ${theme === 'bold' ? 'bg-yellow-600' : theme === 'local' ? 'bg-green-200' : 'bg-gray-200'}`} />
                        <div className={`absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full blur-[120px] opacity-30 ${theme === 'bold' ? 'bg-purple-900' : theme === 'local' ? 'bg-orange-200' : 'bg-gray-300'}`} />

                                <p className="text-sm opacity-70 mb-4">Enter your Gemini API Key to enable live generation.</p>
                                <input type="password" placeholder="Paste API Key here..." className="w-full border p-3 rounded mb-4" value={apiKey} onChange={(e) => setApiKey(e.target.value)} />

                    </section>

                    {/* GBP PLAYGROUND */}
                    <section id="local" className="py-24 relative bg-gray-100">
                        <div className="container mx-auto px-6">
                            <div className="text-center mb-12">
                                <h2 className={`text-4xl md:text-5xl mb-4 ${theme === 'local' ? 'font-serif' : 'font-bold'}`}>Google Business Profile Playground</h2>
                                <p className="opacity-70">Simulate, Optimize, and Respond. Your sandbox for Local SEO dominance.</p>
                            </div>

                            <div className="flex flex-col md:flex-row gap-8">
                                {/* TOOLKIT PANEL */}
                                <div className={`md:w-1/2 p-8 rounded-2xl shadow-xl ${t.card}`}>
                                    <div className="flex gap-4 border-b border-black/10 mb-6 pb-2">
                                        <button onClick={() => setActiveGbpTab('bio')} className={`pb-2 font-bold ${activeGbpTab === 'bio' ? 'border-b-2 border-black opacity-100' : 'opacity-40'}`}>Bio Optimizer</button>
                                        <button onClick={() => setActiveGbpTab('reviews')} className={`pb-2 font-bold ${activeGbpTab === 'reviews' ? 'border-b-2 border-black opacity-100' : 'opacity-40'}`}>Review Responder</button>
                                    </div>

                                    {activeGbpTab === 'bio' ? (
                                        <div className="space-y-4">
                                            <p className="text-sm opacity-70">Paste your current bio. AI will rewrite it for "Entity SEO".</p>
                                            <textarea rows="5" value={gbpInput} onChange={(e) => setGbpInput(e.target.value)} className="w-full bg-black/5 p-4 rounded-lg text-sm outline-none focus:bg-white border border-transparent focus:border-black/20 transition-all" placeholder="e.g. Best coffee shop in Tarneit serving brunch..." />
                                            <button onClick={optimizeGBP} disabled={isOptimizingGBP} className={`w-full py-3 rounded-lg font-bold flex justify-center items-center gap-2 ${t.button} ${isOptimizingGBP ? 'opacity-50' : ''}`}>
                                                {isOptimizingGBP ? <Loader2 className="animate-spin" size={18}/> : <><Sparkles size={18}/> Generate Optimized Bio</>}
                                            </button>
                                            {gbpResult && (
                                                <div className="mt-4 p-4 bg-green-50 border border-green-200 rounded-lg relative group">
                                                    <p className="text-sm text-green-900 whitespace-pre-wrap">{gbpResult}</p>
                                                    <button onClick={() => copyToClipboard(gbpResult)} className="absolute top-2 right-2 p-1 rounded hover:bg-green-200 text-green-700 opacity-0 group-hover:opacity-100 transition-opacity"><Copy size={14}/></button>
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            <p className="text-sm opacity-70">Paste a customer review. AI will draft a perfect response.</p>
                                            <div className="p-4 bg-white border border-gray-200 rounded-lg">
                                                <div className="flex items-center gap-2 mb-2">
                                                    <div className="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold">J</div>
                                                    <span className="font-bold text-sm">John Doe</span>
                                                    <div className="flex text-yellow-400"><Star size={12} fill="currentColor" /><Star size={12} fill="currentColor" /><Star size={12} fill="currentColor" /><Star size={12} fill="currentColor" /><Star size={12} fill="currentColor" /></div>
                                                </div>
                                                <input type="text" value={reviewInput} onChange={(e) => setReviewInput(e.target.value)} className="w-full text-sm outline-none italic text-gray-600" />
                                            </div>
                                            <button onClick={generateReviewResponse} disabled={isOptimizingGBP} className={`w-full py-3 rounded-lg font-bold flex justify-center items-center gap-2 ${t.button} ${isOptimizingGBP ? 'opacity-50' : ''}`}>
                                                {isOptimizingGBP ? <Loader2 className="animate-spin" size={18}/> : <><MessageSquare size={18}/> Draft Response</>}
                                            </button>
                                            {reviewResponse && (
                                                <div className="mt-4 p-4 bg-blue-50 border border-blue-200 rounded-lg relative group">
                                                    <span className="text-xs font-bold text-blue-800 uppercase mb-1 block">Your Response:</span>
                                                    <p className="text-sm text-blue-900 whitespace-pre-wrap">{reviewResponse}</p>
                                                    <button onClick={() => copyToClipboard(reviewResponse)} className="absolute top-2 right-2 p-1 rounded hover:bg-blue-200 text-blue-700 opacity-0 group-hover:opacity-100 transition-opacity"><Copy size={14}/></button>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                {/* PREVIEW PANEL */}
                                <div className="md:w-1/2">
                                     <div className="bg-white rounded-xl shadow-2xl overflow-hidden max-w-sm mx-auto transform border border-gray-200 sticky top-24">
                                      <div className="bg-[#4285F4] p-4 flex items-center gap-3 text-white">
                                        <Search size={20} />
                                        <span className="font-medium text-sm">Google Search Result</span>
                                      </div>
                                      <div className="p-6">
                                        <h3 className="font-bold text-xl mb-1">{scanInput.name || "Business Name"}</h3>
                                        <div className="flex items-center gap-1 mb-2 text-sm">
                                          <span className="font-bold">5.0</span>
                                          <div className="flex text-yellow-400"><Star size={14} fill="currentColor" /><Star size={14} fill="currentColor" /><Star size={14} fill="currentColor" /><Star size={14} fill="currentColor" /><Star size={14} fill="currentColor" /></div>
                                          <span className="text-gray-500">(Reviews)</span>
                                        </div>
                                        <p className="text-gray-600 text-sm mb-4">{gbpInput ? "Bio Updated..." : "Coffee Shop · Tarneit Central"}</p>
                                        <div className="flex gap-2 mb-4">
                                          <span className="bg-green-100 text-green-700 px-2 py-0.5 rounded text-xs font-bold">Open</span>
                                          <span className="text-gray-500 text-xs py-0.5">Closes 5PM</span>
                                        </div>
                                        <hr className="border-gray-100 my-4"/>
                                        <div className="text-sm">
                                            <span className="font-bold block mb-1">From the Owner</span>
                                            <p className="text-gray-600 line-clamp-4">{gbpResult || gbpInput || "Your optimized bio will appear here to simulate the live customer view."}</p>
                                        </div>
                                      </div>
                                   </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* 90-DAY STRATEGY ENGINE */}
                    <section id="strategy" className={`py-24 ${t.secondary} bg-opacity-30`}>
                        <div className="container mx-auto px-6">
                            <div className="text-center max-w-3xl mx-auto mb-16">
                                <span className={`inline-block px-4 py-1 rounded-full text-xs font-bold mb-4 ${theme === 'bold' ? 'bg-yellow-400 text-black' : 'bg-current text-white'}`}>THE 90-DAY ENGINE</span>
                                <h2 className={`text-4xl md:text-6xl mb-6 ${theme === 'local' ? 'font-serif' : 'font-bold'}`}>12 Weeks. Zero Guesswork.</h2>
                                <p className="opacity-70 text-lg mb-8">Full content strategy ready to deploy. Copy, paste, post.</p>
                            </div>

                            <div className={`max-w-6xl mx-auto rounded-2xl overflow-hidden shadow-2xl ${t.card}`}>
                                <div className="flex border-b border-black/10 overflow-x-auto">
                                    {['month1', 'month2', 'month3'].map((m) => (
                                        <button key={m} onClick={() => setActiveMonth(m)} className={`flex-1 px-6 py-5 text-sm md:text-base font-bold uppercase tracking-wider transition-colors whitespace-nowrap ${activeMonth === m ? (theme === 'bold' ? 'bg-yellow-400 text-black' : 'bg-black/5 border-b-4 border-black') : 'hover:bg-black/5 opacity-50'}`}>
                                            {SOCIAL_STRATEGY_90[m].title}
                                        </button>
                                    ))}
                                </div>

                                <div className="p-8 md:p-12 min-h-[400px]">
                                    <div className="mb-8">
                                        <h3 className="text-2xl font-bold mb-2">{SOCIAL_STRATEGY_90[activeMonth].title}</h3>
                                        <p className="opacity-70 italic border-l-4 border-current pl-4">{SOCIAL_STRATEGY_90[activeMonth].focus}</p>
                                    </div>

                                    <div className="grid lg:grid-cols-2 gap-8">
                                        {SOCIAL_STRATEGY_90[activeMonth].weeks.map((item, i) => (
                                            <div key={i} className="space-y-4">
                                                <div className="flex items-center gap-3">
                                                    <span className={`text-xs font-bold uppercase px-3 py-1 rounded-full ${theme === 'bold' ? 'bg-zinc-800 text-white' : 'bg-black text-white'}`}>{item.week}</span>
                                                    <span className="font-bold opacity-50">{item.theme}</span>
                                                </div>
                                                <div className="space-y-3">
                                                    {item.posts.map((post, pIndex) => (
                                                        <div key={pIndex} className="p-4 rounded-xl border border-black/5 bg-white/50 hover:border-black/20 transition-all relative group">
                                                            <div className="flex justify-between items-start mb-2">
                                                                <span className="text-[10px] font-bold uppercase tracking-wide opacity-50">{post.platform} • {post.type}</span>
                                                                <button onClick={() => copyToClipboard(post.content)} className="p-1 rounded hover:bg-black/10 transition-colors opacity-0 group-hover:opacity-100" title="Copy Content">
                                                                    <Copy size={14} />
                                                                </button>
                                                            </div>
                                                            <div className="text-sm whitespace-pre-wrap leading-relaxed opacity-80 font-mono text-xs">
                                                                {post.content}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CONTACT */}
                    <section id="contact" className={`py-24 ${theme === 'bold' ? 'bg-zinc-900' : 'bg-black text-white'}`}>
                        <div className="container mx-auto px-6 max-w-4xl">
                           <div className="text-center mb-16">
                              <h2 className="text-4xl md:text-6xl font-bold mb-6">Start Your Digital Empire.</h2>
                           </div>
                           <form className="space-y-6">
                              <div className="grid md:grid-cols-2 gap-6">
                                <input type="text" className="w-full bg-transparent border-b border-white/20 py-4 focus:border-white outline-none transition-colors" placeholder="Name" />
                                <input type="email" className="w-full bg-transparent border-b border-white/20 py-4 focus:border-white outline-none transition-colors" placeholder="Email" />
                              </div>
                              <textarea rows="4" className="w-full bg-transparent border-b border-white/20 py-4 focus:border-white outline-none transition-colors" placeholder="Objective..." />
                              <button type="button" className={`w-full py-5 rounded-lg font-bold text-lg tracking-widest uppercase transition-all hover:scale-[1.01] ${theme === 'bold' ? 'bg-yellow-400 text-black' : 'bg-white text-black'}`}>Initiate</button>
                           </form>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
