<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#050d1a"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <!-- K letter -->
  <g filter="url(#glow2)">
    <text x="16" y="22" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="20" fill="#00d4ff" opacity="0.95">K</text>
  </g>
  <!-- Pulse ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="13;14.5;13" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
