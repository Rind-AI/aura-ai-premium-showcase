<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="backgroundGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </radialGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#backgroundGradient)" rx="20"/>
  
  <!-- Neural Network Pattern -->
  <g stroke="#00d4aa" stroke-width="2" opacity="0.4" fill="none">
    <!-- Horizontal connections -->
    <line x1="80" y1="80" x2="320" y2="80"/>
    <line x1="80" y1="120" x2="320" y2="120"/>
    <line x1="80" y1="160" x2="320" y2="160"/>
    <line x1="80" y1="200" x2="320" y2="200"/>
    <line x1="80" y1="240" x2="320" y2="240"/>
    <line x1="80" y1="280" x2="320" y2="280"/>
    
    <!-- Vertical connections -->
    <line x1="80" y1="80" x2="80" y2="280"/>
    <line x1="120" y1="80" x2="120" y2="280"/>
    <line x1="160" y1="80" x2="160" y2="280"/>
    <line x1="200" y1="80" x2="200" y2="280"/>
    <line x1="240" y1="80" x2="240" y2="280"/>
    <line x1="280" y1="80" x2="280" y2="280"/>
    <line x1="320" y1="80" x2="320" y2="280"/>
  </g>
  
  <!-- Neural Nodes -->
  <g fill="#00d4aa" opacity="0.7">
    <circle cx="80" cy="80" r="4"/>
    <circle cx="120" cy="80" r="4"/>
    <circle cx="160" cy="80" r="4"/>
    <circle cx="200" cy="80" r="4"/>
    <circle cx="240" cy="80" r="4"/>
    <circle cx="280" cy="80" r="4"/>
    <circle cx="320" cy="80" r="4"/>
    
    <circle cx="80" cy="120" r="4"/>
    <circle cx="120" cy="120" r="4"/>
    <circle cx="160" cy="120" r="4"/>
    <circle cx="200" cy="120" r="4"/>
    <circle cx="240" cy="120" r="4"/>
    <circle cx="280" cy="120" r="4"/>
    <circle cx="320" cy="120" r="4"/>
    
    <circle cx="80" cy="160" r="4"/>
    <circle cx="120" cy="160" r="4"/>
    <circle cx="160" cy="160" r="4"/>
    <circle cx="240" cy="160" r="4"/>
    <circle cx="280" cy="160" r="4"/>
    <circle cx="320" cy="160" r="4"/>
    
    <circle cx="80" cy="200" r="4"/>
    <circle cx="120" cy="200" r="4"/>
    <circle cx="160" cy="200" r="4"/>
    <circle cx="240" cy="200" r="4"/>
    <circle cx="280" cy="200" r="4"/>
    <circle cx="320" cy="200" r="4"/>
    
    <circle cx="80" cy="240" r="4"/>
    <circle cx="120" cy="240" r="4"/>
    <circle cx="160" cy="240" r="4"/>
    <circle cx="200" cy="240" r="4"/>
    <circle cx="240" cy="240" r="4"/>
    <circle cx="280" cy="240" r="4"/>
    <circle cx="320" cy="240" r="4"/>
    
    <circle cx="80" cy="280" r="4"/>
    <circle cx="120" cy="280" r="4"/>
    <circle cx="160" cy="280" r="4"/>
    <circle cx="200" cy="280" r="4"/>
    <circle cx="240" cy="280" r="4"/>
    <circle cx="280" cy="280" r="4"/>
    <circle cx="320" cy="280" r="4"/>
  </g>
  
  <!-- Central Brain Icon -->
  <circle cx="200" cy="160" r="50" fill="#00d4aa" filter="url(#glow)"/>
  
  <!-- Brain Pattern -->
  <g stroke="white" stroke-width="4" fill="none">
    <path d="M 175 160 A 25 25 0 0 1 225 160"/>
    <path d="M 182 160 A 18 18 0 0 1 200 160"/>
    <path d="M 200 160 A 18 18 0 0 1 218 160"/>
  </g>
  
  <!-- Company Name -->
  <text x="200" y="250" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="36" font-weight="bold" filter="url(#glow)">NeuraNest</text>
  
  <!-- Tagline -->
  <text x="200" y="280" text-anchor="middle" fill="#00d4aa" font-family="Arial, sans-serif" font-size="20" font-weight="bold">AI ARCHITECTURE</text>
  
  <!-- Subtle glow overlay -->
  <circle cx="200" cy="200" r="150" fill="url(#backgroundGradient)" opacity="0.1"/>
</svg>