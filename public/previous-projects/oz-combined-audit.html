<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC; /* Slate 50 */
            color: #0F172A; /* Slate 900 */
        }
        
        h1, h2, h3, .brand-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Chart Container Styling - MANDATORY */
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 350px;
            max-height: 400px;
        }
        
        /* Custom Scrollbar for sleek look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .nav-item.active {
            border-bottom: 2px solid #0EA5E9; /* Sky 500 */
            color: #0EA5E9;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <!-- Chosen Palette: "Digital Twilight" adapted for Light Mode. 
         Background: Slate-50 (Clean, Trust). 
         Text: Slate-900 (Authority). 
         Accents: Sky-500 (Tech/AI) and Emerald-500 (Growth/Value). 
         Why: Balances the "High-Tech/AI" nature of NeuraNest with the "Trust/Retail" needs of Smart Cases. -->
    
    <!-- Application Structure Plan: 
         1. Executive Vision: High-level strategy summary (The "Why").
         2. Forensic Audit: Data visualization of current failings (The "Problem").
         3. 2026 Intelligence: Market trends and AI agent shifts (The "Context").
         4. Brand DNA: The new visual identity system (The "Solution").
         5. Smart Cases Live: A functional functional prototype of the new store (The "Product").
         6. Execution Roadmap: 90-day plan (The "Path").
         
         Flow: Linear narrative from Problem -> Context -> Solution -> Proof -> Action. 
         Reasoning: This structure sells the rebrand *strategically* before showing the visuals, establishing authority. -->
         
    <!-- Visualization & Content Choices:
         - Radar Chart (Audit): Compares "Current" vs "Target" scores across 5 axes (Trust, Speed, SEO, UX, Brand). Goal: Inform/Compare.
         - Bar Chart (Trends): Shows E-commerce growth 2023-2030. Goal: Inform/Context.
         - Interactive Product Grid (Prototype): Simulates the new "curated" shopping experience with filters. Goal: Engagement/Experience.
         - Timeline (Roadmap): 90-Day step-by-step plan. Goal: Inform/Plan.
         - No SVG/Mermaid: Using CSS shapes, Unicode, and Chart.js Canvas. -->
    
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
</head>

                <!-- Phase 2 -->
                <div class="relative pl-8">
                    <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-emerald-500 border-4 border-white shadow-sm"></div>
                    <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                        <span class="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-1 block">Days 31-60</span>
                        <h3 class="text-xl font-bold text-slate-900 mb-2">Phase 2: Content & Authority</h3>
                        <ul class="space-y-2 text-sm text-gray-600">
                            <li class="flex items-start gap-2"><span>🔹</span> Deploy 3 "Pillar Content" guides (e.g., "Battery Health Guide").</li>
                            <li class="flex items-start gap-2"><span>🔹</span> Implement automated review collection flows.</li>
                            <li class="flex items-start gap-2"><span>🔹</span> Launch "Help Hub" for customer self-service.</li>
                        </ul>
                    </div>
                </div>

                <!-- Phase 3 -->
                <div class="relative pl-8">
                    <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-sky-500 border-4 border-white shadow-sm"></div>
                    <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                        <span class="text-xs font-bold text-sky-600 uppercase tracking-wider mb-1 block">Days 61-90</span>
                        <h3 class="text-xl font-bold text-slate-900 mb-2">Phase 3: Scale & Community</h3>
                        <ul class="space-y-2 text-sm text-gray-600">
                            <li class="flex items-start gap-2"><span>🚀</span> Launch Community "Smart Tech Savers" group.</li>
                            <li class="flex items-start gap-2"><span>🚀</span> Activate Agentic AI schema markup across all product lines.</li>
                            <li class="flex items-start gap-2"><span>🚀</span> Full marketing push on "New Look, Same Great Value".</li>
                        </ul>
                    </div>
                </div>

            </div>
            
            <div class="p-6 bg-slate-900 rounded-xl text-center">
                <p class="text-white mb-4">Ready to execute this strategy?</p>
                <a href="#" class="inline-block bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-2 px-6 rounded-lg transition">Download Full PDF Report</a>
            </div>
        </div>
    </template>

    <script>
        // State Management
        let cartItems = 0;
        
        // Product Data for Prototype
        const products = [
            { id: 1, name: "Ultra-Clear MagSafe Case", price: 19.95, category: "Apple", tag: "Best Seller" },
            { id: 2, name: "Galaxy S26 Tough Armor", price: 24.95, category: "Samsung", tag: "New" },
            { id: 3, name: "30W Fast Wall Charger", price: 29.95, category: "Chargers", tag: "Essential" },
            { id: 4, name: "Braided USB-C Cable (2m)", price: 14.95, category: "Chargers", tag: "Value" },
            { id: 5, name: "Privacy Screen Protector", price: 12.95, category: "Apple", tag: "" },
            { id: 6, name: "Pixel 9 Pro Liquid Case", price: 18.95, category: "Google", tag: "" },
            { id: 7, name: "AirPods Pro 2 Hook Case", price: 15.95, category: "Audio", tag: "" },
            { id: 8, name: "Magnetic Car Mount", price: 34.95, category: "Chargers", tag: "Trending" },
        ];

        // Navigation Logic
        function nav(tabId) {
            // Update UI State
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active', 'text-sky-600', 'font-bold'));
            const activeBtn = document.getElementById(`nav-${tabId}`);
            if(activeBtn) activeBtn.classList.add('active', 'text-sky-600');
            
            // Inject Content
            const contentArea = document.getElementById('app-content');
            const template = document.getElementById(`tpl-${tabId}`);
            
            if(template) {
                contentArea.innerHTML = template.innerHTML;
            }

            // Trigger specific logic for tabs
            if(tabId === 'audit') initAuditCharts();
            if(tabId === 'trends') initTrendCharts();
            if(tabId === 'prototype') renderProducts('all');
        }

        // Prototype Logic: Render Products
        function renderProducts(filter) {
            const grid = document.getElementById('product-grid');
            if(!grid) return;

            grid.innerHTML = '';
            
            const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = "group bg-white rounded-xl border border-gray-100 p-4 hover:shadow-lg transition cursor-pointer";
                card.innerHTML = `
                    <div class="h-32 bg-gray-50 rounded-lg mb-4 flex items-center justify-center relative overflow-hidden">
                        <span class="text-4xl group-hover:scale-110 transition duration-300">📱</span>
                        ${p.tag ? `<span class="absolute top-2 left-2 bg-slate-900 text-white text-[10px] font-bold px-2 py-0.5 rounded">${p.tag}</span>` : ''}
                    </div>
                    <h4 class="text-sm font-bold text-slate-900 mb-1">${p.name}</h4>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-emerald-600 font-bold">$${p.price}</span>
                        <button onclick="addToCart(this)" class="bg-sky-50 text-sky-600 hover:bg-sky-600 hover:text-white p-2 rounded-lg transition text-xs font-bold">Add +</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Prototype Logic: Filter
        function filterProducts(category) {
            renderProducts(category);
        }

        // Prototype Logic: Cart
        function addToCart(btn) {
            cartItems++;
            const counter = document.getElementById('cart-count');
            if(counter) {
                counter.innerText = cartItems;
                counter.classList.add('animate-ping');
                setTimeout(() => counter.classList.remove('animate-ping'), 300);
            }
            
            // Button Feedback
            const originalText = btn.innerText;
            btn.innerText = "Added";
            btn.classList.add('bg-emerald-500', 'text-white');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('bg-emerald-500', 'text-white');
            }, 1000);
        }

        // Chart.js: Audit Radar
        function initAuditCharts() {
            const ctx = document.getElementById('auditRadarChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Brand Trust', 'Mobile Speed', 'SEO Authority', 'UX Clarity', 'AI Readiness'],
                    datasets: [{
                        label: 'Current Status (Oz Cheap Deals)',
                        data: [30, 40, 50, 35, 20],
                        backgroundColor: 'rgba(239, 68, 68, 0.2)',
                        borderColor: 'rgba(239, 68, 68, 1)',
                        pointBackgroundColor: 'rgba(239, 68, 68, 1)',
                        borderWidth: 2
                    },
                    {
                        label: '2026 Target (Smart Cases)',
                        data: [90, 95, 85, 90, 80],
                        backgroundColor: 'rgba(14, 165, 233, 0.2)',
                        borderColor: 'rgba(14, 165, 233, 1)',
                        pointBackgroundColor: 'rgba(14, 165, 233, 1)',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: '#E2E8F0' },
                            grid: { color: '#E2E8F0' },
                            pointLabels: { font: { size: 12, family: 'Inter' } },
                            suggestedMin: 0,
                            suggestedMax: 100
                        }
                    },
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        // Chart.js: Market Trends Bar
        function initTrendCharts() {
            const ctx = document.getElementById('marketBarChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['2023', '2024', '2025', '2026 (Projected)', '2030 (Forecast)'],
                    datasets: [{
                        label: 'AUS E-commerce Market Size ($ Billion)',
                        data: [63, 70, 78, 86, 108],
                        backgroundColor: [
                            '#CBD5E1',
                            '#94A3B8',
                            '#64748B',
                            '#0EA5E9', // Highlight 2026
                            '#0F172A'
                        ],
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { display: false } },
                        x: { grid: { display: false } }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `$${context.raw} Billion`;
                                }
                            }
                        }
                    }
                }
            });
        }

        // Initialize on Load
        document.addEventListener('DOMContentLoaded', () => {
            nav('vision'); // Start at Executive Vision
        });

    </script>
</body>
</html>
