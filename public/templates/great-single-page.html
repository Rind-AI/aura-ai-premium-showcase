<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copywithaliyah | Digital Empire OS</title>
    
    <!-- React & Tailwind via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons (Vanilla JS version) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .glass-dark { background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICON SYSTEM FIX ---
        // Helper to convert vanilla Lucide icon definitions into React Components
        const createLucideIcon = (iconName) => (props) => {
            const iconData = window.lucide?.icons?.[iconName];
            
            if (!iconData) {
                console.warn(`Icon "${iconName}" not found in lucide library.`);
                return null;
            }

            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={props.size || 24}
                    height={props.size || 24}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth={props.strokeWidth || 2}
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={props.className}
                    {...props}
                >
                    {iconData.map((iconNode, index) => {
                        const [tag, attrs] = iconNode;
                        return React.createElement(tag, { ...attrs, key: index });
                    })}
                </svg>
            );
        };

        // Initialize Icons
        const Menu = createLucideIcon('Menu');
        const X = createLucideIcon('X');
        const ChevronRight = createLucideIcon('ChevronRight');
        const ArrowRight = createLucideIcon('ArrowRight');
        const Download = createLucideIcon('Download');
        const CheckCircle = createLucideIcon('CheckCircle');
        const Globe = createLucideIcon('Globe');
        const Zap = createLucideIcon('Zap');
        const BarChart3 = createLucideIcon('BarChart3');
        const Mail = createLucideIcon('Mail');
        const Linkedin = createLucideIcon('Linkedin');
        const Instagram = createLucideIcon('Instagram');
        const MapPin = createLucideIcon('MapPin');
        const MousePointer2 = createLucideIcon('MousePointer2');
        const Layout = createLucideIcon('Layout');
        const Type = createLucideIcon('Type');
        const Feather = createLucideIcon('Feather');
        const Search = createLucideIcon('Search');
        const Star = createLucideIcon('Star');
        const TrendingUp = createLucideIcon('TrendingUp');
        const AlertCircle = createLucideIcon('AlertCircle');
        const ShieldCheck = createLucideIcon('ShieldCheck');
        const Key = createLucideIcon('Key');
        const Loader2 = createLucideIcon('Loader2');
        const Sparkles = createLucideIcon('Sparkles');
        const RefreshCw = createLucideIcon('RefreshCw');


        // --- THEMES ---
        const THEMES = {
            minimal: {
                name: "Minimal",
                bg: "bg-stone-50",
                text: "text-stone-900",
                accent: "text-stone-500",
                primary: "bg-stone-900",
                secondary: "bg-stone-200",
                font: "font-sans",
                button: "bg-stone-900 text-white hover:bg-stone-700",
                card: "bg-white border border-stone-100 shadow-sm"
            },
            bold: {
                name: "Bold",
                bg: "bg-zinc-950",
                text: "text-white",
                accent: "text-yellow-400",
                primary: "bg-yellow-400",
                secondary: "bg-zinc-800",
                font: "font-sans tracking-tight",
                button: "bg-yellow-400 text-black font-bold hover:bg-yellow-300 uppercase tracking-widest",
                card: "bg-zinc-900 border border-zinc-800 shadow-2xl shadow-yellow-900/10"
            },
            local: {
                name: "Local",
                bg: "bg-[#F5F2EA]", 
                text: "text-[#2C3E50]",
                accent: "text-[#E67E22]", 
                primary: "bg-[#27AE60]", 
                secondary: "bg-[#EAE6D6]", 
                font: "font-serif",
                button: "bg-[#2C3E50] text-white hover:bg-[#34495E]",
                card: "bg-[#FFFDF7] border border-[#E0DBC5] shadow-md"
            }
        };

        // --- MOCK DATA (Fallback) ---
        const MOCK_SCAN_DATA = [
            { category: "Local SEO Visibility", score: 42, status: "Critical", insight: "Business invisible in 'Near Me' searches outside 5km radius." },
            { category: "Brand Voice Consistency", score: 85, status: "Good", insight: "Strong social presence, but website copy feels disconnected." },
            { category: "Conversion Rate", score: 12, status: "Warning", insight: "Welcome sequence missing. Leaving approx $2k/mo on table." },
            { category: "AI Safety Score", score: 95, status: "Excellent", insight: "Content passes 'Humanity Check'. Low risk of hallucination." }
        ];

        const SOCIAL_STRATEGY_90 = {
            month1: { title: "Month 1: Foundation", focus: "Establish authority.", weeks: [ { week: "Week 1", task: "Origin Story Reel", platform: "IG", type: "Brand" }, { week: "Week 2", task: "Competitor Audit", platform: "LinkedIn", type: "Growth" } ] },
            month2: { title: "Month 2: Velocity", focus: "Expand reach.", weeks: [ { week: "Week 5", task: "Local Collab", platform: "IG", type: "Growth" }, { week: "Week 6", task: "UGC Campaign", platform: "Email", type: "Social Proof" } ] },
            month3: { title: "Month 3: Scale", focus: "Automate sales.", weeks: [ { week: "Week 9", task: "Deep Dive Case Study", platform: "Blog", type: "Authority" }, { week: "Week 10", task: "Waitlist Launch", platform: "Web", type: "Sales" } ] }
        };

        const App = () => {
            const [theme, setTheme] = useState('local');
            const [activeMonth, setActiveMonth] = useState('month1');
            const [greeting, setGreeting] = useState('Welcome');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            
            // --- AI STATE ---
            const [apiKey, setApiKey] = useState('');
            const [showApiKeyModal, setShowApiKeyModal] = useState(false);
            const [scanInput, setScanInput] = useState({ name: '', location: '' });
            const [scanResult, setScanResult] = useState(null);
            const [isScanning, setIsScanning] = useState(false);
            const [gbpInput, setGbpInput] = useState('');
            const [gbpResult, setGbpResult] = useState('');
            const [isOptimizingGBP, setIsOptimizingGBP] = useState(false);

            const t = THEMES[theme];

            useEffect(() => {
                const hour = new Date().getHours();
                if (hour < 12) setGreeting("Good Morning, Melbourne.");
                else if (hour < 18) setGreeting("Good Afternoon.");
                else setGreeting("Good Evening.");

                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollTo = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                    setIsMenuOpen(false);
                }
            };

            // --- GEMINI API CALLER ---
            const callGemini = async (prompt) => {
                if (!apiKey) {
                    setShowApiKeyModal(true);
                    return null;
                }

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Error generating content.";
                } catch (error) {
                    console.error("Gemini API Error:", error);
                    alert("Failed to connect to Gemini. Check your API Key.");
                    return null;
                }
            };

            // --- FUNCTION: RUN SCAN ---
            const runAuditScan = async () => {
                if (!scanInput.name || !scanInput.location) return alert("Please enter name and location");
                setIsScanning(true);
                
                const prompt = `Act as a digital marketing auditor. Analyze a hypothetical business named "${scanInput.name}" in "${scanInput.location}". 
                Generate a JSON response (ONLY JSON) with this structure: 
                [{"category": "Local SEO", "score": 45, "status": "Critical", "insight": "Short specific insight"}, 
                {"category": "Brand Voice", "score": 70, "status": "Good", "insight": "Insight..."},
                {"category": "Conversion", "score": 30, "status": "Warning", "insight": "Insight..."},
                {"category": "AI Safety", "score": 90, "status": "Excellent", "insight": "Insight..."}]`;

                const resultText = await callGemini(prompt);
                
                if (resultText) {
                    try {
                        // Clean markdown if present
                        const jsonStr = resultText.replace(/```json/g, '').replace(/```/g, '');
                        setScanResult(JSON.parse(jsonStr));
                    } catch (e) {
                        setScanResult(MOCK_SCAN_DATA); // Fallback if JSON parse fails
                        console.log("JSON Parse Error, using mock");
                    }
                } else {
                    setScanResult(MOCK_SCAN_DATA);
                }
                setIsScanning(false);
            };

            // --- FUNCTION: OPTIMIZE GBP ---
            const optimizeGBP = async () => {
                if (!gbpInput) return;
                setIsOptimizingGBP(true);
                const prompt = `Rewrite this business description for a Google Business Profile to be optimized for "Entity SEO" and "Generative Engine Optimization" (GEO). Make it sound human but authoritative. Business Info: ${gbpInput}`;
                const result = await callGemini(prompt);
                if (result) setGbpResult(result);
                setIsOptimizingGBP(false);
            }

            return (
                <div className={`min-h-screen transition-colors duration-700 ${t.bg} ${t.text} ${t.font} overflow-x-hidden relative`}>
                    
                    {/* PARALLAX BG */}
                    <div className="fixed inset-0 z-0 pointer-events-none overflow-hidden">
                        <div className={`absolute top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full blur-[120px] opacity-30 ${theme === 'bold' ? 'bg-yellow-600' : theme === 'local' ? 'bg-green-200' : 'bg-gray-200'}`} />
                        <div className={`absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full blur-[120px] opacity-30 ${theme === 'bold' ? 'bg-purple-900' : theme === 'local' ? 'bg-orange-200' : 'bg-gray-300'}`} />
                    </div>

                    {/* API KEY MODAL */}
                    {showApiKeyModal && (
                        <div className="fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-4">
                            <div className="bg-white text-black p-8 rounded-xl max-w-md w-full shadow-2xl">
                                <h3 className="text-xl font-bold mb-4 flex items-center gap-2"><Key size={20}/> Activate Gemini AI</h3>
                                <p className="text-sm opacity-70 mb-4">Enter your Gemini API Key to enable live scanning and generation features.</p>
                                <input 
                                    type="password" 
                                    placeholder="Paste API Key here..."
                                    className="w-full border p-3 rounded mb-4"
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                />
                                <div className="flex justify-end gap-2">
                                    <button onClick={() => setShowApiKeyModal(false)} className="px-4 py-2 opacity-50 text-sm">Cancel</button>
                                    <button onClick={() => setShowApiKeyModal(false)} className="px-4 py-2 bg-black text-white rounded font-bold">Save Key</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NAV */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'py-4 bg-opacity-90 backdrop-blur-md shadow-sm' : 'py-6 bg-transparent'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-2 font-bold text-xl tracking-tighter cursor-pointer z-50" onClick={() => scrollTo('hero')}>
                                <span className={`w-3 h-3 rounded-full ${theme === 'bold' ? 'bg-yellow-400' : theme === 'local' ? 'bg-green-600' : 'bg-black'}`}></span>
                                Aliyah.
                            </div>
                            <div className="hidden md:flex items-center gap-8">
                                {['Principles', 'Scan', 'Strategy', 'Local', 'Work'].map(item => (
                                    <button key={item} onClick={() => scrollTo(item.toLowerCase())} className="text-sm font-medium hover:opacity-70 transition-opacity uppercase tracking-wide">{item}</button>
                                ))}
                                <button onClick={() => setShowApiKeyModal(true)} title="AI Settings">
                                    <Key size={18} className={apiKey ? "text-green-500" : "opacity-50"} />
                                </button>
                                <button className={`px-5 py-2 rounded-full text-sm font-semibold transition-transform hover:scale-105 ${t.button}`}>Start Growth</button>
                            </div>
                            <button className="md:hidden z-50" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                {isMenuOpen ? <X size={24} /> : <Menu size={24} />}
                            </button>
                        </div>
                    </nav>

                    {/* HERO */}
                    <section id="hero" className="relative pt-32 pb-20 md:pt-48 md:pb-32 px-6 container mx-auto z-10 flex flex-col md:flex-row items-center gap-12">
                        <div className="flex-1 space-y-8">
                            <div className={`inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-bold tracking-widest border ${theme === 'bold' ? 'border-yellow-400/30 bg-yellow-400/10 text-yellow-400' : 'border-current opacity-60'}`}>
                                <span className="animate-pulse">●</span> SYSTEM STATUS: ONLINE
                            </div>
                            <h1 className={`text-5xl md:text-7xl lg:text-8xl leading-[0.9] ${theme === 'local' ? 'font-serif italic' : 'font-bold'}`}>
                                <span className="block text-xl md:text-2xl mb-4 font-sans opacity-70 font-normal">{greeting}</span>
                                Digital Empire <br />
                                <span className={t.accent}>Architect.</span>
                            </h1>
                            <p className="max-w-md text-lg opacity-80 leading-relaxed">
                                Stop guessing. Start dominating. We combine AI precision with high-touch human storytelling.
                            </p>
                            <div className="flex flex-wrap gap-4 pt-4">
                                <button onClick={() => scrollTo('strategy')} className={`px-8 py-4 rounded-lg font-bold flex items-center gap-2 transition-all hover:gap-4 ${t.button}`}>
                                    View Strategy <ArrowRight size={18} />
                                </button>
                                <button onClick={() => scrollTo('scan')} className={`px-8 py-4 rounded-lg font-bold border-2 border-current hover:bg-black/5 flex items-center gap-2 transition-all`}>
                                    Run Live Scan
                                </button>
                            </div>
                        </div>

                        {/* VIBE SWITCHER */}
                        <div className="w-full md:w-auto">
                            <div className={`p-6 rounded-2xl w-full md:w-80 backdrop-blur-xl ${t.card}`}>
                                <h3 className="text-xs font-bold uppercase tracking-widest opacity-50 mb-4">Interface Vibe</h3>
                                <div className="space-y-3">
                                    {[
                                        { id: 'minimal', icon: Layout, label: 'Minimalist' },
                                        { id: 'bold', icon: Zap, label: 'High Voltage' },
                                        { id: 'local', icon: MapPin, label: 'Local Soul' },
                                    ].map((mode) => (
                                        <button
                                            key={mode.id}
                                            onClick={() => setTheme(mode.id)}
                                            className={`w-full flex items-center gap-4 p-3 rounded-lg transition-all ${theme === mode.id ? (theme === 'bold' ? 'bg-yellow-400 text-black font-bold' : 'bg-black/10 font-bold') : 'hover:bg-black/5 opacity-60'}`}
                                        >
                                            <mode.icon size={18} />
                                            <span>{mode.label}</span>
                                            {theme === mode.id && <CheckCircle size={16} className="ml-auto" />}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* LIVE SCAN SECTION */}
                    <section id="scan" className="py-20 relative overflow-hidden">
                        <div className="container mx-auto px-6 relative z-10">
                            <div className="flex flex-col lg:flex-row gap-12 items-center">
                                <div className="lg:w-1/2">
                                    <div className={`inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-bold tracking-widest border mb-6 ${theme === 'bold' ? 'border-yellow-400/30 text-yellow-400' : 'border-current opacity-60'}`}>
                                        <AlertCircle size={14} /> LIVE DIAGNOSTIC TOOL
                                    </div>
                                    <h2 className={`text-4xl md:text-5xl mb-6 ${theme === 'local' ? 'font-serif' : 'font-bold'}`}>Where are you leaking revenue?</h2>
                                    <p className="opacity-70 text-lg mb-8">
                                        Enter your business details below. Our AI will perform a real-time "Pulse Check" on your digital footprint.
                                    </p>
                                    
                                    <div className={`p-6 rounded-xl space-y-4 ${t.card}`}>
                                        <div>
                                            <label className="text-xs uppercase font-bold opacity-50">Business Name</label>
                                            <input 
                                                type="text" 
                                                value={scanInput.name} 
                                                onChange={(e) => setScanInput({...scanInput, name: e.target.value})}
                                                placeholder="e.g. ToxikBean Coffee" 
                                                className="w-full bg-transparent border-b border-black/20 py-2 outline-none focus:border-black transition-colors"
                                            />
                                        </div>
                                        <div>
                                            <label className="text-xs uppercase font-bold opacity-50">Location</label>
                                            <input 
                                                type="text" 
                                                value={scanInput.location} 
                                                onChange={(e) => setScanInput({...scanInput, location: e.target.value})}
                                                placeholder="e.g. Tarneit, VIC" 
                                                className="w-full bg-transparent border-b border-black/20 py-2 outline-none focus:border-black transition-colors"
                                            />
                                        </div>
                                        <button 
                                            onClick={runAuditScan}
                                            disabled={isScanning}
                                            className={`w-full py-3 rounded-lg font-bold flex justify-center items-center gap-2 ${t.button} ${isScanning ? 'opacity-50' : ''}`}
                                        >
                                            {isScanning ? <><Loader2 className="animate-spin" size={18}/> Analyzing...</> : "Run Live Pulse Check"}
                                        </button>
                                        {!apiKey && <p className="text-xs text-center opacity-50 mt-2">*Requires API Key (Click key icon in nav)</p>}
                                    </div>
                                </div>
                                
                                <div className={`lg:w-1/2 w-full p-8 rounded-2xl ${t.card} transition-all duration-500 ${isScanning ? 'opacity-50 blur-sm' : 'opacity-100'}`}>
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="font-bold text-lg">Digital Health Report</h3>
                                        <span className="text-xs opacity-50">LIVE STATUS</span>
                                    </div>
                                    <div className="space-y-4">
                                        {(scanResult || MOCK_SCAN_DATA).map((item, i) => (
                                            <div key={i} className="flex items-center gap-4 p-4 rounded-lg bg-black/5">
                                                <div className={`w-12 h-12 rounded-full flex items-center justify-center font-bold text-sm ${item.score < 50 ? 'bg-red-100 text-red-600' : item.score < 80 ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700'}`}>
                                                    {item.score}
                                                </div>
                                                <div className="flex-1">
                                                    <div className="flex justify-between mb-1">
                                                        <span className="font-bold text-sm">{item.category}</span>
                                                        <span className={`text-[10px] uppercase font-bold px-2 py-0.5 rounded ${item.status === 'Critical' ? 'bg-red-500 text-white' : item.status === 'Warning' ? 'bg-yellow-500 text-white' : 'bg-green-500 text-white'}`}>
                                                            {item.status}
                                                        </span>
                                                    </div>
                                                    <p className="text-xs opacity-70 leading-tight">{item.insight}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* GOOGLE BUSINESS PROFILE AI OPTIMIZER */}
                    <section id="local" className="py-24 relative">
                        <div className="container mx-auto px-6">
                            <div className="flex flex-col md:flex-row gap-16 items-start">
                                <div className="md:w-1/2">
                                   <h2 className={`text-4xl md:text-5xl mb-6 ${theme === 'local' ? 'font-serif' : 'font-bold'}`}>From SEO to GEO.</h2>
                                   <h3 className={`text-xl font-bold mb-4 ${t.accent}`}>Dominate the "Map Pack" with AI.</h3>
                                   <p className="opacity-70 text-lg mb-6">
                                       Paste your current business description below. Gemini will rewrite it to target "Entity Authority" and "Semantic Search".
                                   </p>
                                   <div className={`p-6 rounded-xl ${t.card}`}>
                                        <textarea 
                                            rows="4" 
                                            value={gbpInput}
                                            onChange={(e) => setGbpInput(e.target.value)}
                                            className="w-full bg-transparent border border-black/10 p-3 rounded mb-4 text-sm" 
                                            placeholder="Paste current description here..."
                                        ></textarea>
                                        <button 
                                            onClick={optimizeGBP}
                                            disabled={isOptimizingGBP}
                                            className={`w-full py-3 rounded-lg font-bold flex justify-center items-center gap-2 ${t.button} ${isOptimizingGBP ? 'opacity-50' : ''}`}
                                        >
                                            {isOptimizingGBP ? <Loader2 className="animate-spin"/> : <><Sparkles size={18}/> Optimize for Google AI</>}
                                        </button>
                                   </div>
                                   {gbpResult && (
                                       <div className="mt-6 p-4 bg-green-50 border border-green-200 rounded-lg">
                                           <div className="flex justify-between items-center mb-2">
                                               <span className="text-xs font-bold text-green-700 uppercase">Optimized Output</span>
                                               <button onClick={() => navigator.clipboard.writeText(gbpResult)} className="text-xs text-green-700 underline">Copy</button>
                                           </div>
                                           <p className="text-sm text-green-900 whitespace-pre-wrap">{gbpResult}</p>
                                       </div>
                                   )}
                                </div>
                                
                                <div className="md:w-1/2 sticky top-24">
                                   {/* GBP Simulation Card */}
                                   <div className="bg-white rounded-xl shadow-2xl overflow-hidden max-w-sm mx-auto transform rotate-[-2deg] border border-gray-200">
                                      <div className="bg-[#4285F4] p-4 flex items-center gap-3 text-white">
                                        <Search size={20} />
                                        <span className="font-medium text-sm">Best Coffee Tarneit</span>
                                      </div>
                                      <div className="p-6">
                                        <h3 className="font-bold text-xl mb-1">{scanInput.name || "ToxikBean Coffee"}</h3>
                                        <div className="flex items-center gap-1 mb-2 text-sm">
                                          <span className="font-bold">5.0</span>
                                          <div className="flex text-yellow-400"><Star size={14} fill="currentColor" /><Star size={14} fill="currentColor" /><Star size={14} fill="currentColor" /><Star size={14} fill="currentColor" /><Star size={14} fill="currentColor" /></div>
                                          <span className="text-gray-500">(142 reviews)</span>
                                        </div>
                                        <p className="text-gray-600 text-sm mb-4">Coffee Shop · {scanInput.location || "Tarneit Central"}</p>
                                        <div className="flex gap-2 mb-4">
                                          <span className="bg-green-100 text-green-700 px-2 py-0.5 rounded text-xs font-bold">Open</span>
                                          <span className="text-gray-500 text-xs py-0.5">Closes 5PM</span>
                                        </div>
                                        <button className="w-full border border-gray-300 rounded py-2 text-blue-600 font-medium text-sm hover:bg-gray-50">
                                          Visit Website
                                        </button>
                                      </div>
                                   </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* 90-DAY STRATEGY */}
                    <section id="strategy" className={`py-24 ${t.secondary} bg-opacity-30`}>
                        <div className="container mx-auto px-6">
                            <div className="text-center max-w-3xl mx-auto mb-16">
                                <span className={`inline-block px-4 py-1 rounded-full text-xs font-bold mb-4 ${theme === 'bold' ? 'bg-yellow-400 text-black' : 'bg-current text-white'}`}>THE 90-DAY ENGINE</span>
                                <h2 className={`text-4xl md:text-6xl mb-6 ${theme === 'local' ? 'font-serif' : 'font-bold'}`}>Blueprint to Authority</h2>
                                <p className="opacity-70 text-lg mb-8">
                                    We build 90-day execution cycles designed to move your customer from "Stranger" to "Advocate".
                                </p>
                            </div>

                            <div className={`max-w-5xl mx-auto rounded-2xl overflow-hidden shadow-2xl ${t.card}`}>
                                <div className="flex border-b border-black/10 overflow-x-auto">
                                    {['month1', 'month2', 'month3'].map((m) => (
                                        <button
                                            key={m}
                                            onClick={() => setActiveMonth(m)}
                                            className={`flex-1 px-6 py-5 text-sm md:text-base font-bold uppercase tracking-wider transition-colors whitespace-nowrap ${activeMonth === m ? (theme === 'bold' ? 'bg-yellow-400 text-black' : 'bg-black/5 border-b-4 border-black') : 'hover:bg-black/5 opacity-50'}`}
                                        >
                                            {SOCIAL_STRATEGY_90[m].title}
                                        </button>
                                    ))}
                                </div>

                                <div className="p-8 md:p-12 min-h-[400px]">
                                    <div className="mb-8 flex justify-between items-start">
                                        <div>
                                            <h3 className="text-2xl font-bold mb-2">{SOCIAL_STRATEGY_90[activeMonth].title}</h3>
                                            <p className="opacity-70 italic border-l-4 border-current pl-4">{SOCIAL_STRATEGY_90[activeMonth].focus}</p>
                                        </div>
                                        <button className="p-2 rounded-full hover:bg-black/5 transition-colors" title="AI Refresh Strategy">
                                            <RefreshCw size={20} className="opacity-50" />
                                        </button>
                                    </div>

                                    <div className="grid md:grid-cols-2 gap-6">
                                        {SOCIAL_STRATEGY_90[activeMonth].weeks.map((item, i) => (
                                            <div key={i} className="p-5 rounded-xl border border-black/5 hover:border-black/20 transition-all bg-white/50 group">
                                                <div className="flex justify-between items-start mb-3">
                                                    <span className={`text-[10px] font-bold uppercase px-2 py-1 rounded ${theme === 'bold' ? 'bg-zinc-800 text-white' : 'bg-black text-white'}`}>
                                                        {item.week}
                                                    </span>
                                                    <span className="text-[10px] font-bold uppercase opacity-50">{item.platform}</span>
                                                </div>
                                                <h4 className="font-bold text-lg mb-2 group-hover:text-blue-600 transition-colors">{item.task}</h4>
                                                <span className="text-xs px-2 py-1 rounded bg-black/5 inline-block">Focus: {item.type}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CONTACT */}
                    <section id="contact" className={`py-24 ${theme === 'bold' ? 'bg-zinc-900' : 'bg-black text-white'}`}>
                        <div className="container mx-auto px-6 max-w-4xl">
                           <div className="text-center mb-16">
                              <h2 className="text-4xl md:text-6xl font-bold mb-6">Start Your Digital Empire.</h2>
                              <p className="text-xl opacity-60">Melbourne based. Global impact. Ready to deploy.</p>
                           </div>
                           <form className="space-y-6">
                              <div className="grid md:grid-cols-2 gap-6">
                                <input type="text" className="w-full bg-transparent border-b border-white/20 py-4 focus:border-white outline-none transition-colors" placeholder="Name" />
                                <input type="email" className="w-full bg-transparent border-b border-white/20 py-4 focus:border-white outline-none transition-colors" placeholder="Email" />
                              </div>
                              <textarea rows="4" className="w-full bg-transparent border-b border-white/20 py-4 focus:border-white outline-none transition-colors" placeholder="Project Objective..." />
                              <div className="flex items-start gap-3 py-4">
                                <input type="checkbox" id="privacy" className="mt-1" />
                                <label htmlFor="privacy" className="text-xs opacity-60">
                                  I agree to the collection of my data for business correspondence. Compliance: Privacy Act 1988 (Cth).
                                </label>
                              </div>
                              <button type="button" className={`w-full py-5 rounded-lg font-bold text-lg tracking-widest uppercase transition-all hover:scale-[1.01] ${theme === 'bold' ? 'bg-yellow-400 text-black' : 'bg-white text-black'}`}>
                                Initiate Sequence
                              </button>
                           </form>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
