<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneDrive Project Dashboard - Emperor Rind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-active { background-color: #dcfce7; color: #166534; }
        .status-at-risk { background-color: #fef3c7; color: #92400e; }
        .status-error { background-color: #fecaca; color: #991b1b; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">OneDrive Project Dashboard</h1>
                <p class="text-sm text-gray-600 mt-1">
                    Enterprise Project Management • Role: <span class="font-medium text-blue-600">Executive</span>
                </p>
            </div>
            <div class="flex items-center gap-4">
                <div id="connectionStatus" class="flex items-center gap-2 text-sm text-amber-600">
                    <div class="w-2 h-2 bg-amber-400 rounded-full"></div>
                    Authentication Required
                </div>
            </div>
        </div>
    </header>

    <div class="flex h-[calc(100vh-80px)]">
        <!-- Sidebar -->
        <aside class="w-80 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-4 border-b border-gray-100">
                <div class="relative">
                    <input
                        id="searchInput"
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Search projects..."
                    />
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto">
                <div id="projectsList" class="p-2">
                    <div class="text-center py-8">
                        <div class="text-gray-500 mb-4">
                            <svg class="mx-auto h-12 w-12 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                            <p class="text-sm">Please authenticate with Microsoft</p>
                        </div>
                        <button
                            onclick="authenticateUser()"
                            class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
                        >
                            Authenticate with Microsoft
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <div class="p-6 grid grid-cols-1 xl:grid-cols-2 gap-6">
                <!-- Project Summary Card -->
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold text-gray-900">Project Overview</h2>
                        <button
                            onclick="openOneDrive()"
                            class="px-3 py-1 text-sm border border-gray-300 rounded-md hover:bg-gray-50 transition-colors"
                        >
                            Open in OneDrive
                        </button>
                    </div>

                    <div id="projectSummary" class="text-center py-8">
                        <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <p class="text-gray-500">Select a project to view details</p>
                    </div>
                </div>

                <!-- AI Query Card -->
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                    <div class="flex items-center gap-2 mb-4">
                        <h2 class="text-lg font-semibold text-gray-900">AI Project Assistant</h2>
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                            Powered by OpenAI
                        </span>
                    </div>

                    <div id="aiSection" class="text-center py-8">
                        <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                        </svg>
                        <p class="text-gray-500">Select a project to start asking questions</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function authenticateUser() {
            // Open authentication window
            window.open('http://localhost:4000/auth/login', '_blank');
            
            // Check authentication status every 2 seconds
            const checkAuth = setInterval(async () => {
                try {
                    const response = await fetch('http://localhost:4000/api/projects', {
                        credentials: 'include'
                    });
                    
                    if (response.ok) {
                        clearInterval(checkAuth);
                        const projects = await response.json();
                        displayProjects(projects);
                        updateConnectionStatus(true);
                    }
                } catch (error) {
                    // Still waiting for authentication
                }
            }, 2000);
        }

        function displayProjects(projects) {
            const projectsList = document.getElementById('projectsList');
            
            if (projects.length === 0) {
                projectsList.innerHTML = `
                    <div class="text-center py-8">
                        <p class="text-gray-500">No projects found in your OneDrive</p>
                    </div>
                `;
                return;
            }

            projectsList.innerHTML = projects.map(project => `
                <button
                    onclick="selectProject('${project.id}', '${project.name}')"
                    class="w-full text-left p-3 rounded-lg mb-2 transition-all hover:bg-gray-50 border"
                >
                    <div class="flex items-start justify-between">
                        <div class="flex-1 min-w-0">
                            <h3 class="font-medium text-gray-900 truncate">${project.name}</h3>
                            <p class="text-xs text-gray-500 mt-1 truncate">${project.path}</p>
                            ${project.lastUpdate ? `
                                <p class="text-xs text-gray-400 mt-1">
                                    Updated ${new Date(project.lastUpdate).toLocaleDateString()}
                                </p>
                            ` : ''}
                        </div>
                        <div class="ml-2 flex-shrink-0">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                        </div>
                    </div>
                    ${project.tags && project.tags.length > 0 ? `
                        <div class="flex flex-wrap gap-1 mt-2">
                            ${project.tags.slice(0, 2).map(tag => `
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">${tag}</span>
                            `).join('')}
                        </div>
                    ` : ''}
                </button>
            `).join('');
        }

        function selectProject(projectId, projectName) {
            // Highlight selected project
            document.querySelectorAll('#projectsList button').forEach(btn => {
                btn.classList.remove('bg-blue-50', 'border-l-4', 'border-blue-500', 'shadow-sm');
            });
            event.target.closest('button').classList.add('bg-blue-50', 'border-l-4', 'border-blue-500', 'shadow-sm');

            // Load project summary
            loadProjectSummary(projectId, projectName);
        }

        async function loadProjectSummary(projectId, projectName) {
            const summaryElement = document.getElementById('projectSummary');
            
            // Show loading
            summaryElement.innerHTML = `
                <div class="space-y-4">
                    <div class="animate-pulse">
                        <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
                        <div class="h-4 bg-gray-200 rounded w-1/2 mb-2"></div>
                        <div class="h-4 bg-gray-200 rounded w-5/6"></div>
                    </div>
                </div>
            `;

            try {
                const response = await fetch(`http://localhost:4000/api/projects/${projectId}/summary`, {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const summary = await response.json();
                    displayProjectSummary(projectName, summary);
                    enableAISection(projectId);
                } else {
                    throw new Error('Failed to load summary');
                }
            } catch (error) {
                summaryElement.innerHTML = `
                    <div class="space-y-4">
                        <div>
                            <h3 class="font-medium text-gray-900 mb-2">${projectName}</h3>
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">Error</span>
                        </div>
                        <div>
                            <h4 class="text-sm font-medium text-gray-700 mb-1">Status</h4>
                            <p class="text-sm text-gray-600">Unable to load project summary</p>
                        </div>
                    </div>
                `;
            }
        }

        function displayProjectSummary(projectName, summary) {
            const summaryElement = document.getElementById('projectSummary');
            
            summaryElement.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <h3 class="font-medium text-gray-900 mb-2">${projectName}</h3>
                        <div class="flex gap-2">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getStatusClass(summary.status)}">${summary.status}</span>
                            ${summary.riskLevel ? `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getRiskClass(summary.riskLevel)}">Risk: ${summary.riskLevel}</span>` : ''}
                        </div>
                    </div>

                    ${summary.nextMilestone ? `
                        <div>
                            <h4 class="text-sm font-medium text-gray-700 mb-1">Next Milestone</h4>
                            <p class="text-sm text-gray-600">${summary.nextMilestone}</p>
                        </div>
                    ` : ''}

                    ${summary.lastUpdate ? `
                        <div>
                            <h4 class="text-sm font-medium text-gray-700 mb-1">Last Updated</h4>
                            <p class="text-sm text-gray-600">${new Date(summary.lastUpdate).toLocaleString()}</p>
                        </div>
                    ` : ''}

                    ${summary.issues && summary.issues.length > 0 ? `
                        <div>
                            <h4 class="text-sm font-medium text-gray-700 mb-2">Issues & Risks</h4>
                            <ul class="space-y-1">
                                ${summary.issues.map(issue => `
                                    <li class="text-sm text-gray-600 flex items-start">
                                        <span class="text-red-400 mr-2">•</span>
                                        ${issue}
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    ` : ''}

                    ${summary.notes ? `
                        <div>
                            <h4 class="text-sm font-medium text-gray-700 mb-1">Notes</h4>
                            <p class="text-sm text-gray-600 bg-gray-50 p-3 rounded">${summary.notes}</p>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function enableAISection(projectId) {
            const aiSection = document.getElementById('aiSection');
            
            aiSection.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <textarea
                            id="aiQuestion"
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
                            rows="4"
                            placeholder="Ask about project status, documents, deadlines, or any other project-related questions..."
                        ></textarea>
                    </div>

                    <button
                        onclick="askAI('${projectId}')"
                        class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center justify-center gap-2"
                    >
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                        Ask AI
                    </button>

                    <div id="aiResponse"></div>
                </div>
            `;
        }

        async function askAI(projectId) {
            const question = document.getElementById('aiQuestion').value.trim();
            if (!question) return;

            const responseDiv = document.getElementById('aiResponse');
            
            // Show loading
            responseDiv.innerHTML = `
                <div class="p-3 bg-yellow-50 border border-yellow-200 rounded-lg">
                    <p class="text-sm text-yellow-700">AI is thinking...</p>
                </div>
            `;

            try {
                const response = await fetch('http://localhost:4000/api/ai/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ projectId, question })
                });

                if (response.ok) {
                    const aiAnswer = await response.json();
                    displayAIResponse(aiAnswer);
                } else {
                    throw new Error('AI request failed');
                }
            } catch (error) {
                responseDiv.innerHTML = `
                    <div class="border border-gray-200 rounded-lg p-4 bg-gray-50">
                        <h4 class="font-medium text-gray-900 mb-2">AI Response</h4>
                        <div class="prose prose-sm max-w-none">
                            <p class="text-gray-700">Mock AI Response for "${question}": Based on the selected project, you can find relevant documents in the project folder. This would normally provide intelligent insights about your project files.</p>
                        </div>
                    </div>
                `;
            }
        }

        function displayAIResponse(aiAnswer) {
            const responseDiv = document.getElementById('aiResponse');
            
            responseDiv.innerHTML = `
                <div class="border border-gray-200 rounded-lg p-4 bg-gray-50">
                    <h4 class="font-medium text-gray-900 mb-2">AI Response</h4>
                    <div class="prose prose-sm max-w-none">
                        <p class="text-gray-700 whitespace-pre-wrap">${aiAnswer.answer}</p>
                    </div>
                    ${aiAnswer.sources && aiAnswer.sources.length > 0 ? `
                        <div class="mt-3 pt-3 border-t border-gray-200">
                            <h5 class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-2">Sources</h5>
                            <ul class="space-y-1">
                                ${aiAnswer.sources.map(source => `
                                    <li class="text-xs text-gray-600 flex items-center gap-2">
                                        <span class="w-2 h-2 bg-blue-400 rounded-full"></span>
                                        <span class="font-medium">${source.name}</span>
                                        <span class="text-gray-400">•</span>
                                        <span>${source.path}</span>
                                        ${typeof source.score === "number" ? `
                                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">${Math.round(source.score * 100)}% relevance</span>
                                        ` : ''}
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function updateConnectionStatus(connected) {
            const statusElement = document.getElementById('connectionStatus');
            
            if (connected) {
                statusElement.innerHTML = `
                    <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                    Connected to OneDrive
                `;
                statusElement.className = 'flex items-center gap-2 text-sm text-green-600';
            } else {
                statusElement.innerHTML = `
                    <div class="w-2 h-2 bg-amber-400 rounded-full"></div>
                    Authentication Required
                `;
                statusElement.className = 'flex items-center gap-2 text-sm text-amber-600';
            }
        }

        function getStatusClass(status) {
            switch (status?.toLowerCase()) {
                case 'active':
                case 'on track':
                    return 'bg-green-100 text-green-800';
                case 'at risk':
                    return 'bg-yellow-100 text-yellow-800';
                case 'delayed':
                case 'error':
                    return 'bg-red-100 text-red-800';
                case 'completed':
                    return 'bg-blue-100 text-blue-800';
                default:
                    return 'bg-gray-100 text-gray-800';
            }
        }

        function getRiskClass(risk) {
            switch (risk?.toLowerCase()) {
                case 'low':
                    return 'bg-green-100 text-green-800';
                case 'medium':
                    return 'bg-yellow-100 text-yellow-800';
                case 'high':
                    return 'bg-red-100 text-red-800';
                default:
                    return 'bg-gray-100 text-gray-800';
            }
        }

        function openOneDrive() {
            window.open('https://onedrive.live.com', '_blank');
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const projectButtons = document.querySelectorAll('#projectsList button');
            
            projectButtons.forEach(button => {
                const projectName = button.querySelector('h3').textContent.toLowerCase();
                const projectPath = button.querySelector('p').textContent.toLowerCase();
                
                if (projectName.includes(searchTerm) || projectPath.includes(searchTerm)) {
                    button.style.display = 'block';
                } else {
                    button.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
